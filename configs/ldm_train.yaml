# LDM Training Configuration
# Usage: python scripts/train_ldm.py --config configs/ldm_train.yaml

model:
  vae:
    in_channels: 3
    latent_channels: 4
    hidden_dims: [128, 256, 512, 512]
    image_size: 256
    use_kan_decoder: true
  denoiser:
    in_channels: 4
    out_channels: 4
    model_channels: 320
    channel_mult: [1, 2, 4, 4]
    num_res_blocks: 2
    attention_resolutions: [1, 2, 3]
    context_dim: 768
    num_heads: 8
    use_cross_attn: true
    use_checkpoint: false
  diffusion:
    timesteps: 1000
    beta_schedule: linear
    loss_type: l2
    prediction_type: epsilon
    min_snr_gamma: 5.0

training:
  batch_size: 32
  epochs: 500
  lr: 1.0e-4
  weight_decay: 0.01
  grad_clip_norm: 1.0
  num_workers: 4
  use_amp: true
  use_ema: true
  ema_decay: 0.9999
  gradient_accumulation_steps: 4
  seed: 42
  unconditional_prob: 0.1

paths:
  vae_checkpoint: /path/to/vae_best.pth
  text_encoder_model: openai/clip-vit-large-patch14
  data_root: /path/to/coco
  exp_name: ldm_coco
  output_dir: experiments

logging:
  log_every: 100
  val_every: 5
  sample_every: 10
  save_every: 50
